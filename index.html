<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Shop | Bootstrap Grid</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      /* Custom Hover Effect */
      .product-card {
        transition: transform 0.3s ease;
        overflow: hidden;
      }
      .product-card img {
        transition:
          transform 0.5s ease,
          filter 0.3s ease;
      }
      .product-card:hover img {
        transform: scale(1.1); /* Zooms image on hover */
        filter: brightness(80%);
      }
      .footer-section {
        background-color: #f8f9fa;
        padding: 40px 0;
        margin-top: 50px;
        border-top: 1px solid #dee2e6;
      }
      .logo-placeholder {
        max-width: 80px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="bg-dark py-3 mb-4">
      <div class="container text-white text-center">
        <h1>The Online Store</h1>
      </div>
    </header>

    <!-- Product Grid -->
    <div class="container">
      <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4">
        <!-- Loop of 10 Products -->
        <!-- Product 1 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/sD9XQN0.jpeg" class="card-img-top img-fluid" alt="Product 1" />
            <div class="card-body text-center">
              <h5 class="card-title">Classic Watch</h5>
              <p class="card-text fw-bold">$120.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 2 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/lfX620o.jpeg" class="card-img-top img-fluid" alt="Product 2" />
            <div class="card-body text-center">
              <h5 class="card-title">Leather Bag</h5>
              <p class="card-text fw-bold">$85.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 3 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img
              src="https://img.freepik.com/premium-vector/3d-realistic-sunglasses-isolated-white-background-sunglasses-vector_618941-50.jpg"
              class="card-img-top img-fluid"
              alt="Product 3"
            />
            <div class="card-body text-center">
              <h5 class="card-title">Sunglasses</h5>
              <p class="card-text fw-bold">$45.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 4 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img
              src="https://cdn-images.farfetch-contents.com/24/50/80/50/24508050_54930144_600.jpg"
              class="card-img-top img-fluid"
              alt="Product 4"
            />
            <div class="card-body text-center">
              <h5 class="card-title">Denim Jacket</h5>
              <p class="card-text fw-bold">$110.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 5 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/6RNijri.jpeg" class="card-img-top img-fluid" alt="Product 5" />
            <div class="card-body text-center">
              <h5 class="card-title">Sneakers</h5>
              <p class="card-text fw-bold">$90.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 6 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/m7c2xUZ.jpeg" class="card-img-top img-fluid" alt="Product 6" />
            <div class="card-body text-center">
              <h5 class="card-title">Cotton T-Shirt</h5>
              <p class="card-text fw-bold">$25.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 7 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/7xvKFyb.jpeg" class="card-img-top img-fluid" alt="Product 7" />
            <div class="card-body text-center">
              <h5 class="card-title">Wool Scarf</h5>
              <p class="card-text fw-bold">$30.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 8 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/pvoXwpL.jpeg" class="card-img-top img-fluid" alt="Product 8" />
            <div class="card-body text-center">
              <h5 class="card-title">Backpack</h5>
              <p class="card-text fw-bold">$65.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 9 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/NEtgrtM.jpeg" class="card-img-top img-fluid" alt="Product 9" />
            <div class="card-body text-center">
              <h5 class="card-title">Cap</h5>
              <p class="card-text fw-bold">$20.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
        <!-- Product 10 -->
        <div class="col">
          <div class="card h-100 product-card">
            <img src="https://i.imgur.com/aViFOig.jpeg" class="card-img-top img-fluid" alt="Product 10" />
            <div class="card-body text-center">
              <h5 class="card-title">Belt</h5>
              <p class="card-text fw-bold">$35.00</p>
              <button class="btn btn-primary w-100">Buy</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer-section">
      <div class="container">
        <div class="row align-items-center">
          <!-- Logo -->
          <div class="col-md-2 text-center mb-3 mb-md-0">
            <img
              src="https://images-platform.99static.com//I7pyOkD_JBmJDP5lEgRJftAOX4I=/24x20:1180x1176/fit-in/500x500/projects-files/188/18801/1880101/e24c41b8-5d9a-497a-b350-35b584fa1114.jpg"
              alt="Company Logo"
              class="logo-placeholder"
            />
          </div>
          <!-- Horizontal Form -->
          <div class="col-md-10">
            <h5 class="mb-3">Contact Us / Stay Updated</h5>
            <form class="row g-3">
              <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Full Name" aria-label="Full Name" />
              </div>
              <div class="col-md-4">
                <input type="email" class="form-control" placeholder="Email Address" aria-label="Email" />
              </div>
              <div class="col-md-4">
                <button type="submit" class="btn btn-dark w-100">Subscribe</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
